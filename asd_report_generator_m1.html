<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASD Report Generator — Juri Monasso PT</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ─── RESET & BASE ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #faf9f6;
  --white:   #ffffff;
  --warm:    #f5f0e8;
  --warm2:   #ede8df;
  --ink:     #111111;
  --mid:     #555555;
  --sub:     #999999;
  --line:    #e5e0d5;
  --line2:   #ede8df;
  --red:     #e53935;
  --red-dim: #fdecea;
  --green:   #2e7d32;
  --green-dim:#e8f5e9;
  --amber:   #e65100;
  --amber-dim:#fff3e0;
  --blue:    #1565c0;
  --blue-dim:#e3f2fd;

  --f-display: 'Outfit', sans-serif;
  --f-mono:    'DM Mono', monospace;
  --f-serif:   'Cormorant Garamond', serif;

  --radius: 3px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px var(--line);
  --shadow-lift: 0 4px 16px rgba(0,0,0,0.10), 0 0 0 1px var(--line);
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-display);
  font-size: 18px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ────────────────────────────────────────────────────── */
.app-header {
  background: var(--ink);
  border-left: 4px solid var(--red);
  padding: 22px 40px;
  display: flex;
  align-items: center;
  gap: 24px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.app-header .logo-mark {
  font-family: var(--f-mono);
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--red);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1.5px solid var(--red);
  padding: 6px 12px;
  border-radius: 2px;
  flex-shrink: 0;
}

.app-header .title-group { flex: 1; }

.app-header h1 {
  font-size: 1.35rem;
  font-weight: 800;
  color: #ffffff;
  letter-spacing: -0.02em;
  line-height: 1.2;
}

.app-header .subtitle {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  color: #777;
  letter-spacing: 0.08em;
  margin-top: 3px;
}

.header-status {
  font-family: var(--f-mono);
  font-size: 0.72rem;
  color: #888;
  letter-spacing: 0.06em;
  text-align: right;
}

.header-status .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #444;
  margin-right: 5px;
  vertical-align: middle;
}

.header-status.loaded .dot { background: var(--green); }

/* ─── LAYOUT ────────────────────────────────────────────────────── */
.app-body {
  max-width: 1160px;
  margin: 0 auto;
  padding: 44px 36px 80px;
}

/* ─── SECTION LABEL ─────────────────────────────────────────────── */
.section-label {
  font-family: var(--f-mono);
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--red);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-label::before {
  content: '';
  display: block;
  width: 22px;
  height: 1.5px;
  background: var(--red);
}

/* ─── UPLOAD ZONE ───────────────────────────────────────────────── */
.upload-section { margin-bottom: 44px; }

.drop-zone {
  border: 1.5px dashed var(--line);
  border-radius: var(--radius);
  background: var(--white);
  padding: 52px 40px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  position: relative;
  overflow: hidden;
}

.drop-zone::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3.5px;
  background: var(--line2);
  transition: background 0.18s ease;
}

.drop-zone:hover,
.drop-zone.drag-over {
  border-color: var(--red);
  background: var(--red-dim);
  box-shadow: var(--shadow-lift);
}

.drop-zone:hover::before,
.drop-zone.drag-over::before { background: var(--red); }

.drop-zone.drag-over { transform: scale(1.004); }

.drop-icon {
  font-size: 3.2rem;
  margin-bottom: 18px;
  display: block;
  transition: transform 0.2s ease;
}

.drop-zone:hover .drop-icon { transform: translateY(-3px); }

.drop-title {
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.drop-sub {
  font-family: var(--f-mono);
  font-size: 0.72rem;
  color: var(--sub);
  letter-spacing: 0.06em;
  margin-bottom: 24px;
}

.btn-upload {
  display: inline-block;
  background: var(--ink);
  color: #fff;
  font-family: var(--f-mono);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 12px 28px;
  border-radius: 2px;
  border: none;
  cursor: pointer;
  transition: background 0.15s ease;
}

.btn-upload:hover { background: var(--red); }

#fileInput { display: none; }

/* ─── LOADED STATE ──────────────────────────────────────────────── */
.file-loaded-bar {
  display: none;
  background: var(--white);
  border: 1px solid var(--line);
  border-left: 3.5px solid var(--green);
  border-radius: var(--radius);
  padding: 14px 20px;
  margin-top: 14px;
  align-items: center;
  gap: 16px;
}

.file-loaded-bar.visible { display: flex; }

.file-loaded-bar .file-name {
  font-family: var(--f-mono);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--green);
  flex: 1;
}

.file-loaded-bar .file-meta {
  font-family: var(--f-mono);
  font-size: 0.7rem;
  color: var(--sub);
  letter-spacing: 0.05em;
}

.btn-reset {
  font-family: var(--f-mono);
  font-size: 0.7rem;
  color: var(--sub);
  background: none;
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 6px 14px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}

.btn-reset:hover { border-color: var(--red); color: var(--red); }

/* ─── STATS BAR ─────────────────────────────────────────────────── */
.stats-bar {
  display: none;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 36px;
  animation: fadeUp 0.35s ease forwards;
}

.stats-bar.visible { display: grid; }

.stat-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--line2);
}

.stat-card.accent-red::before  { background: var(--red); }
.stat-card.accent-green::before { background: var(--green); }
.stat-card.accent-amber::before { background: var(--amber); }
.stat-card.accent-blue::before  { background: var(--blue); }

.stat-label {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  color: var(--sub);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
}

.stat-value {
  font-family: var(--f-serif);
  font-size: 3rem;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -0.02em;
}

.stat-sub {
  font-family: var(--f-mono);
  font-size: 0.65rem;
  color: var(--sub);
  margin-top: 6px;
}

/* ─── CLIENT GRID ───────────────────────────────────────────────── */
.clients-section { display: none; }
.clients-section.visible { display: block; }

.clients-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.clients-count {
  font-family: var(--f-mono);
  font-size: 0.72rem;
  color: var(--sub);
  letter-spacing: 0.06em;
}

.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  padding: 8px 16px;
  border-radius: 2px;
  border: 1px solid var(--line);
  background: var(--white);
  color: var(--mid);
  cursor: pointer;
  transition: all 0.14s ease;
}

.filter-btn:hover { border-color: var(--ink); color: var(--ink); }
.filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.filter-btn-io {
  border-color: var(--amber);
  color: var(--amber);
  font-weight: 700;
  letter-spacing: 0.12em;
}
.filter-btn-io:hover { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
.filter-btn-io.active { background: var(--amber); color: #fff; border-color: var(--amber); }

/* IO row in table */
.client-table tbody tr.sono-io-row { background: #fffbf5; }
.client-table tbody tr.sono-io-row:hover { background: #fff3e0; }
.client-table tbody tr.sono-io-row td:first-child { border-left: 4px solid var(--amber); }
.client-table tbody tr.sono-io-row.selected { background: #fff8f0; }
.client-table tbody tr.sono-io-row.selected td:first-child { border-left: 4px solid var(--red); }

/* IO banner shown when filter active */
.io-banner {
  display: none;
  background: var(--amber-dim);
  border: 1px solid #ffe0b2;
  border-left: 4px solid var(--amber);
  border-radius: var(--radius);
  padding: 11px 18px;
  margin-bottom: 14px;
  font-family: var(--f-mono);
  font-size: 0.68rem;
  color: var(--amber);
  font-weight: 500;
  letter-spacing: 0.04em;
  align-items: center;
  gap: 10px;
}
.io-banner.visible { display: flex; }
.io-banner-icon { font-size: 1rem; }
.io-banner-text { flex: 1; color: var(--ink); }
.io-banner-text strong { color: var(--amber); }

/* ─── CLIENT TABLE ──────────────────────────────────────────────── */
.client-table-wrap {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.client-table {
  width: 100%;
  border-collapse: collapse;
}

.client-table thead th {
  font-family: var(--f-mono);
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--sub);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: left;
  padding: 13px 18px;
  border-bottom: 1px solid var(--line);
  background: var(--warm);
  white-space: nowrap;
}

.client-table tbody tr {
  border-bottom: 1px solid var(--line2);
  transition: background 0.12s ease;
  cursor: pointer;
}

.client-table tbody tr:last-child { border-bottom: none; }
.client-table tbody tr:hover { background: var(--warm); }
.client-table tbody tr.selected { background: #fff5f5; }
.client-table tbody tr.selected td:first-child {
  border-left: 4px solid var(--red);
}

.client-table td {
  padding: 14px 18px;
  vertical-align: middle;
}

.client-name {
  font-weight: 700;
  font-size: 1rem;
  color: var(--ink);
  letter-spacing: -0.01em;
}

.client-id {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  color: var(--sub);
  margin-top: 2px;
}

.tag-pill {
  display: inline-block;
  font-family: var(--f-mono);
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  padding: 4px 10px;
  border-radius: 2px;
  border: 1px solid var(--line);
  color: var(--mid);
  background: var(--warm);
  white-space: nowrap;
}

.tag-pill.red   { color: var(--red);   background: var(--red-dim);   border-color: #f4c6c5; }
.tag-pill.green { color: var(--green); background: var(--green-dim); border-color: #c8e6c9; }
.tag-pill.amber { color: var(--amber); background: var(--amber-dim); border-color: #ffe0b2; }
.tag-pill.blue  { color: var(--blue);  background: var(--blue-dim);  border-color: #bbdefb; }

.schedule-dots {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.sched-dot {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  background: var(--warm2);
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 3px 8px;
  color: var(--mid);
  white-space: nowrap;
}

.workout-count {
  font-family: var(--f-mono);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--ink);
}

.workout-count .wc-label {
  font-size: 0.6rem;
  color: var(--sub);
  display: block;
  font-weight: 400;
}

.note-count {
  font-family: var(--f-mono);
  font-size: 0.85rem;
  color: var(--mid);
}

/* ─── SELECTION PANEL ───────────────────────────────────────────── */
.selection-panel {
  display: none;
  margin-top: 32px;
  background: var(--white);
  border: 1px solid var(--line);
  border-left: 4px solid var(--red);
  border-radius: var(--radius);
  padding: 30px 32px;
  animation: fadeUp 0.25s ease forwards;
  box-shadow: var(--shadow-lift);
}

.selection-panel.visible { display: block; }

.sel-panel-title {
  font-size: 1rem;
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 24px;
  letter-spacing: -0.02em;
}

.sel-panel-title span {
  color: var(--red);
}

.sel-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 24px;
  margin-bottom: 26px;
}

.sel-group label {
  display: block;
  font-family: var(--f-mono);
  font-size: 0.65rem;
  font-weight: 500;
  color: var(--sub);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 9px;
}

.sel-group select,
.sel-group input[type="date"] {
  width: 100%;
  font-family: var(--f-mono);
  font-size: 0.8rem;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 10px 12px;
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
  outline: none;
  transition: border-color 0.14s;
}

.sel-group select:focus,
.sel-group input[type="date"]:focus { border-color: var(--red); }

.custom-dates {
  display: none;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: -12px;
  margin-bottom: 26px;
}

.custom-dates.visible { display: grid; }

.mbti-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}

.mbti-btn {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 9px 8px;
  border-radius: 2px;
  border: 1px solid var(--line);
  background: var(--bg);
  color: var(--mid);
  cursor: pointer;
  text-align: center;
  transition: all 0.13s ease;
  line-height: 1.3;
}

.mbti-btn:hover { border-color: var(--ink); color: var(--ink); }
.mbti-btn.selected { background: var(--ink); color: #fff; border-color: var(--ink); }

.mbti-desc {
  font-family: var(--f-mono);
  font-size: 0.56rem;
  display: block;
  opacity: 0.65;
  margin-top: 2px;
}

.sel-report-type {
  display: flex;
  gap: 12px;
  margin-top: 9px;
}

.report-type-btn {
  flex: 1;
  border: 1.5px solid var(--line);
  border-radius: 2px;
  padding: 16px 20px;
  cursor: pointer;
  background: var(--bg);
  transition: all 0.14s ease;
  text-align: left;
}

.report-type-btn:hover { border-color: var(--ink); background: var(--warm); }
.report-type-btn.selected { border-color: var(--red); background: var(--red-dim); }

.report-type-btn .rt-title {
  font-size: 0.92rem;
  font-weight: 800;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 8px;
}

.report-type-btn .rt-sub {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  color: var(--sub);
  margin-top: 4px;
  letter-spacing: 0.04em;
}

/* MBTI section visible only when cliente selected */
.mbti-section { display: none; }
.mbti-section.visible { display: block; }

/* ─── MBTI COLLAPSIBLE ──────────────────────────────────────────── */
.mbti-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--f-mono);
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--ink);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 10px 14px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}

.mbti-trigger:hover { border-color: var(--ink); background: var(--warm); }
.mbti-trigger.open {
  border-color: var(--red);
  border-bottom-color: transparent;
  border-radius: 2px 2px 0 0;
  background: var(--white);
}

.mbti-trigger-label { flex: 1; }

.mbti-trigger-arrow {
  font-size: 0.8rem;
  color: var(--sub);
  transition: transform 0.22s ease, color 0.15s;
  display: inline-block;
  margin-left: 10px;
}

.mbti-trigger.open .mbti-trigger-arrow { transform: rotate(180deg); color: var(--red); }

.mbti-panel {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.26s ease;
  border: 1px solid transparent;
  border-top: none;
  border-radius: 0 0 2px 2px;
}

.mbti-panel.open {
  grid-template-rows: 1fr;
  border-color: var(--red);
}

.mbti-panel-inner {
  overflow: hidden;
  background: var(--white);
  padding: 0 12px;
  transition: padding 0.22s ease;
}

.mbti-panel.open .mbti-panel-inner {
  padding: 14px 12px;
}

/* ─── CTA BUTTON ─────────────────────────────────────────────────── */
.cta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid var(--line2);
}

.cta-info {
  font-family: var(--f-mono);
  font-size: 0.72rem;
  color: var(--sub);
}

.cta-info strong {
  color: var(--ink);
  font-weight: 600;
}

.btn-generate {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: var(--red);
  color: #fff;
  font-family: var(--f-mono);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 14px 32px;
  border-radius: 2px;
  border: none;
  cursor: pointer;
  transition: all 0.15s ease;
  opacity: 0.35;
  pointer-events: none;
}

.btn-generate.ready {
  opacity: 1;
  pointer-events: auto;
}

.btn-generate.ready:hover {
  background: #c62828;
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(229,57,53,0.35);
}

/* ─── PREVIEW PANEL ─────────────────────────────────────────────── */
.preview-section {
  display: none;
  margin-top: 28px;
  animation: fadeUp 0.3s ease forwards;
}

.preview-section.visible { display: block; }

.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.preview-tabs {
  display: flex;
  gap: 2px;
}

.preview-tab {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 16px;
  border: 1px solid var(--line);
  border-radius: 2px;
  background: var(--white);
  color: var(--sub);
  cursor: pointer;
  transition: all 0.13s ease;
}

.preview-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }

.preview-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: var(--shadow);
}

.preview-data-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

.preview-kv { }
.preview-kv .pk-label {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  color: var(--sub);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 500;
}
.preview-kv .pk-value {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--ink);
}

.workouts-mini {
  margin-top: 20px;

  0%   { opacity: 0.6; }
  50%  { opacity: 1; }
  100% { opacity: 0.6; }

.db-body { font-size: .82rem; color: var(--mid); margin-top: 12px; line-height: 1.6; }

/* inline bars */

/* ─── MODAL ──────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);

  font-family: var(--f-mono); font-size: .62rem; font-weight: 500;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 7px 16px; border-radius: 2px; cursor: pointer;
  border: 1px solid var(--line); background: var(--white);

}

/* ─── DECISION TABS ─────────────────────────────────────────────── */
.dtab-nav {
  display: flex;
  gap: 0;
  background: #0d0d12;
  border-bottom: 1px solid #2a2a38;
  padding: 0 32px;

  z-index: 90;
}
.dtab-btn {
  padding: 13px 18px;

  color: #6b6b80;

  border: none;
  border-bottom: 2px solid transparent;

.dtab-btn:hover:not(.active) { color: #c0c0d0; }
.dtab-btn.active { color: #7c6fff; border-bottom-color: #7c6fff; }
.dtab-btn-report { margin-left: auto; color: #555; border-left: 1px solid #2a2a38; padding-left: 20px; }
.dtab-btn-report.active { color: var(--red); border-bottom-color: var(--red); }

.dtab-panel { display: none; }
.dtab-panel.active { display: block; }
.dtab-body { max-width: 1100px; margin: 0 auto; padding: 28px 32px 80px; }

/* ─── DARK PANEL BASE ───────────────────────────────────────────── */
.dp-bg { background: #0a0a0f; }

/* KPI row */
.d-kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px,1fr)); gap: 10px; margin-bottom: 24px; }
.d-kpi { background: #111118; border: 1px solid #2a2a38; border-radius: 7px; padding: 14px 16px; }

.d-kpi-sub { font-family: var(--f-mono); font-size: 0.6rem; color: #6b6b80; margin-top: 3px; }
.d-kpi-value.dv-green { color: #3dd68c; }
.d-kpi-value.dv-yellow { color: #f5c542; }
.d-kpi-value.dv-red { color: #ff5c5c; }

/* Section heading */
.d-sec-title {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  text-transform: uppercase;

.d-action-pri.dp-high { color: #ff9a3c; }
.d-action-pri.dp-medium { color: #f5c542; }
.d-action-pri.dp-low { color: #7c6fff; }

/* Client table dark */

/* Tags */
.d-tag { display: inline-block; font-family: var(--f-mono); font-size: 0.58rem; padding: 2px 6px; border-radius: 3px; font-weight: 500; }
.d-tag.dt-green { background: rgba(61,214,140,0.12); color: #3dd68c; border: 1px solid rgba(61,214,140,0.25); }
.d-tag.dt-yellow { background: rgba(245,197,66,0.12); color: #f5c542; border: 1px solid rgba(245,197,66,0.25); }

.d-filter-row { display: flex; gap: 7px; margin-bottom: 14px; flex-wrap: wrap; }
.d-filter-btn { padding: 5px 11px; border-radius: 4px; border: 1px solid #2a2a38; background: #111118; color: #6b6b80; cursor: pointer; font-family: var(--f-mono); font-size: 0.62rem; transition: all 0.14s; }

/* Progress bar */
.d-prog-bar { width: 100%; height: 5px; background: #2a2a38; border-radius: 3px; overflow: hidden; margin-top: 3px; }
.d-prog-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

/* Pain list */
.d-pain-item { background: #111118; border: 1px solid #2a2a38; border-radius: 6px; padding: 11px 14px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; margin-bottom: 7px; }
.d-pain-name { font-family: var(--f-display); font-weight: 600; font-size: 0.85rem; color: #e8e8f0; }

/* Revenue dot matrix */
.d-dot-matrix { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

@media (max-width: 600px) {

  .dtab-body { padding: 16px; }
  .d-grid-2 { grid-template-columns: 1fr; }
  .d-action-grid { grid-template-columns: 1fr; }
}

<!-- ─── HEADER ─── -->
<header class="app-header">
  <div class="logo-mark">ASD</div>
  <div class="title-group">

    <div class="subtitle">ALLENATI SENZA DOLORI · JURI MONASSO PT</div>
  </div>
  <div class="header-status" id="headerStatus">
    <span class="dot"></span>nessun backup caricato
  </div>
</header>

<!-- ─── BODY ─── -->
<main class="app-body">

  <!-- UPLOAD -->
  <section class="upload-section">
    <div class="drop-zone" id="dropZone">
      <span class="drop-icon">📂</span>
      <div class="drop-title">Trascina qui il backup JSON</div>

      <input type="file" id="fileInput" accept=".json">

    <div class="file-loaded-bar" id="fileLoadedBar">
      <span class="file-name" id="fileNameDisplay">—</span>
      <span class="file-meta" id="fileMetaDisplay">—</span>
      <button class="btn-reset" onclick="resetAll()">✕ Rimuovi</button>

  <!-- DASHBOARD (visibile dopo caricamento) -->
  <div id="dashboardSection" style="display:none">

    <!-- DECISION TABS NAV -->

      <button class="dtab-btn" data-tab="clienti" onclick="showDTab('clienti',this)">👥 Clienti</button>
      <button class="dtab-btn" data-tab="dolore" onclick="showDTab('dolore',this)">🦴 Dolore</button>
      <button class="dtab-btn" data-tab="studio" onclick="showDTab('studio',this)">🏋 Studio</button>
      <button class="dtab-btn" data-tab="revenue" onclick="showDTab('revenue',this)">💰 Revenue</button>
      <button class="dtab-btn" data-tab="io" onclick="showDTab('io',this)">⚡ Tu</button>
      <button class="dtab-btn dtab-btn-report" data-tab="report" onclick="showDTab('report',this)">📄 Report PDF</button>

    <!-- TAB PANELS -->
    <div class="dtab-panel active" id="dtab-decisioni"><div class="dtab-body" id="dtab-decisioni-body"></div></div>
    <div class="dtab-panel" id="dtab-clienti"><div class="dtab-body" id="dtab-clienti-body"></div></div>
    <div class="dtab-panel" id="dtab-dolore"><div class="dtab-body" id="dtab-dolore-body"></div></div>
    <div class="dtab-panel" id="dtab-studio"><div class="dtab-body" id="dtab-studio-body"></div></div>
    <div class="dtab-panel" id="dtab-revenue"><div class="dtab-body" id="dtab-revenue-body"></div></div>
    <div class="dtab-panel" id="dtab-io"><div class="dtab-body" id="dtab-io-body"></div></div>

        <div class="period-bar-inner">
          <span class="period-label">Periodo</span>

            <button class="period-btn" data-period="6m" onclick="onPeriodSelect('6m',this)">6 mesi</button>
            <button class="period-btn" data-period="1y" onclick="onPeriodSelect('1y',this)">1 anno</button>

<script>
/* ═══════════════════════════════════════════════════════════════════
   ASD REPORT GENERATOR — MODULO 1: UPLOAD + PARSING
   ═══════════════════════════════════════════════════════════════════ */

// ─── STATE ──────────────────────────────────────────────────────────
const STATE = {
  raw: null,
  clients: [],
  allClients: [],
  workouts: [],
  notesMap: {},        // clientId → [{date, tipo, text, parsed}]
  percorsoMap: {},     // clientId → {done, total, pct}
  skipMap: {},         // clientId → [{date, who}]
  workoutsMap: {},     // clientId → [workout]
  exportedAt: null,
  selectedClient: null,
  reportType: null,    // 'pt' | 'cliente'
  period: '3m',
  mbti: '',
  filter: 'all',
  filteredClients: [],
  wrappedYear: new Date().getFullYear()
};

// ─── HASHTAG CLASSIFICATION ──────────────────────────────────────────
const HASHTAG_POSITIVE = ['#tecnica-ok', '#motivazione-alta', '#progresso'];
const HASHTAG_NEGATIVE = ['#motivazione-bassa', '#regressione', '#stress', '#pocosonno', '#preciclo', '#ciclo', '#stresslavoro'];

// ─── PARSING UTILITIES ──────────────────────────────────────────────
function parseNote(text) {
  const result = { energia: null, hashtags: [], positivi: [], attenzione: [], reminder: [], note_libere: [] };
  if (!text) return result;

  const mEnergia = text.match(/Energia[:\s]+(\d+)/i);
  if (mEnergia) result.energia = parseInt(mEnergia[1]);

  result.hashtags = (text.match(/#[\w\-\/]+/g) || []).map(h => h.toLowerCase());

  const symbols = [
    { sym: '✅', key: 'positivi' },
    { sym: '⚠️', key: 'attenzione' },
    { sym: '➡️', key: 'reminder' },
    { sym: '📝', key: 'note_libere' }
  ];

  symbols.forEach(({ sym, key }) => {
    const idx = text.indexOf(sym);
    if (idx === -1) return;
    let after = text.slice(idx + sym.length);
    // stop at next pipe or next symbol
    after = after.split('|')[0];
    ['✅','⚠️','➡️','📝'].forEach(s => { const si = after.indexOf(s); if (si > -1) after = after.slice(0, si); });
    const clean = after.replace(/#[\w\-\/]+/g, '').trim();
    if (clean) result[key].push(clean);
  });

  return result;
}

function getAge(dobStr) {
  if (!dobStr) return null;
  const dob = new Date(dobStr.slice(0, 10));
  return Math.floor((Date.now() - dob) / (365.25 * 24 * 3600 * 1000));
}

function formatDateIT(isoStr) {
  if (!isoStr) return '—';
  const d = new Date(isoStr.slice(0, 10));
  return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function filterByPeriod(list, dateField, period, dateFrom, dateTo) {
  const now = new Date();
  let start, end = now;

  if (period === 'custom') {
    start = dateFrom ? new Date(dateFrom) : new Date(0);
    end   = dateTo   ? new Date(dateTo)   : now;
  } else {
    const days = { '1m': 30, '3m': 90, '6m': 180, '1y': 365 }[period] || 90;
    start = new Date(now - days * 86400000);
  }

  return list.filter(item => {
    const d = new Date((item[dateField] || '').slice(0, 10));
    return d >= start && d <= end;
  });
}

// ─── PARSE BACKUP JSON ───────────────────────────────────────────────
function parseBackup(data) {
  STATE.raw = data;
  STATE.exportedAt = data['_exportedAt'] || null;

  // Clients
  const allClients = JSON.parse(data['asd_clients'] || '[]');
  STATE.clients = allClients.filter(c => !c.sonoIo);
  STATE.allClients = allClients; // includes sonoIo:true

  // Workouts
  STATE.workouts = JSON.parse(data['asd_workouts'] || '[]');
  STATE.workoutsMap = {};
  STATE.workouts.forEach(w => {
    if (!STATE.workoutsMap[w.clientId]) STATE.workoutsMap[w.clientId] = [];
    STATE.workoutsMap[w.clientId].push(w);
  });

  // Notes
  STATE.notesMap = {};
  let totalNotes = 0;
  Object.keys(data).forEach(key => {
    if (!key.startsWith('session_notes_')) return;
    const clientId = parseInt(key.replace('session_notes_', ''));
    const raw = JSON.parse(data[key] || '[]');
    totalNotes += raw.length;
    STATE.notesMap[clientId] = raw.map(n => ({
      ...n,
      parsed: parseNote(n.text || '')
    })).sort((a, b) => new Date(b.date) - new Date(a.date));
  });

  // Percorso
  STATE.percorsoMap = {};
  Object.keys(data).forEach(key => {
    if (!key.startsWith('percorso_check_')) return;
    const clientId = parseInt(key.replace('percorso_check_', ''));
    const percorso = JSON.parse(data[key] || '{}');
    const total = Object.keys(percorso).length;
    const done  = Object.values(percorso).filter(Boolean).length;
    STATE.percorsoMap[clientId] = { done, total, pct: total ? Math.round(done / total * 100) : 0 };
  });

  // Skip
  STATE.skipMap = {};
  Object.keys(data).forEach(key => {
    if (!key.startsWith('fixed_skip_')) return;
    const parts = key.split('_');
    // fixed_skip_{clientId}_{date}
    const date     = parts[parts.length - 1];
    const clientId = parseInt(parts[parts.length - 2]);
    if (!STATE.skipMap[clientId]) STATE.skipMap[clientId] = [];
    STATE.skipMap[clientId].push({ date, who: data[key] });
  });

  return { totalNotes };
}

// ─── DRAG & DROP ─────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
dropZone.addEventListener('click', () => fileInput.click());

function loadFile(file) {
  if (!file.name.endsWith('.json')) {
    alert('Carica un file .json di backup ASD');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const { totalNotes } = parseBackup(data);
      onDataLoaded(file, data, totalNotes);
    } catch (err) {
      alert('Errore nel parsing del JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ─── ON DATA LOADED ───────────────────────────────────────────────────
function onDataLoaded(file, data, totalNotes) {
  const hs = document.getElementById('headerStatus');
  hs.className = 'header-status loaded';
  hs.innerHTML = `<span class="dot"></span>${STATE.clients.length} clienti · ${STATE.workouts.length} sedute`;

  const exportDate = STATE.exportedAt ? new Date(STATE.exportedAt).toLocaleString('it-IT') : '—';
  document.getElementById('fileNameDisplay').textContent = file.name;
  document.getElementById('fileMetaDisplay').textContent = `esportato il ${exportDate} · ${(file.size/1024).toFixed(1)} KB`;
  document.getElementById('fileLoadedBar').classList.add('visible');

  // Show dashboard, populate year dropdown for wrapped
  document.getElementById('dashboardSection').style.display = '';
  _populateWrappedYears();
  renderDashboard();
  renderAllDTabs();
  // Start on Decisioni tab
  showDTab('decisioni', document.querySelector('.dtab-btn[data-tab="decisioni"]'));
}

// ─── PERIOD SELECT (new sticky bar) ──────────────────────────────────
function onPeriodSelect(period, btn) {
  STATE.period = period;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('periodCustom').style.display = period === 'custom' ? 'flex' : 'none';
  if (period !== 'custom') renderDashboard();
}

function onDashboardRefresh() {
  if (STATE.period === 'custom') renderDashboard();
}

// ─── RENDER DASHBOARD ────────────────────────────────────────────────
function renderDashboard() {
  const dateFrom = document.getElementById('dateFrom')?.value || '';
  const dateTo   = document.getElementById('dateTo')?.value || '';
  const clients  = STATE.clients;
  const period   = STATE.period;

  if (!clients.length) return;

  const periodDays = getPeriodDays(period, dateFrom, dateTo);
  const periodLabel = getPeriodLabel(period, dateFrom, dateTo);

  // Build clientData
  const clientData = clients.map(c => {
    const allW = STATE.workoutsMap[c.id] || [];
    const w    = filterByPeriod(allW, 'createdAt', period, dateFrom, dateTo);
    const n    = filterByPeriod(STATE.notesMap[c.id] || [], 'date', period, dateFrom, dateTo);
    return { c, w, allW, notes: n, freq: computeFreq(w, periodDays), energy: computeEnergy(n) };
  });
  clientData_global = clientData;

  // KPIs
  const totalSedute     = clientData.reduce((s,d) => s+d.freq.count, 0);
  const seduteConDolore = clientData.reduce((s,d) => s+d.w.filter(w=>w.tipoSeduta==='dolori').length, 0);
  const pctDolore       = totalSedute > 0 ? Math.round(seduteConDolore/totalSedute*100) : 0;
  const slotOccupati    = clients.reduce((s,c) => s+(c.schedule?.length||0), 0);
  const avgFreq         = clientData.length ? (clientData.reduce((s,d)=>s+d.freq.perWeek,0)/clientData.length).toFixed(1) : '—';
  const allPeriodW      = clientData.flatMap(d => d.w);
  const painZones       = computePainZones(allPeriodW);
  const dowData         = computeDowCounts(allPeriodW);
  const maxDow          = dowData.reduce((b,d) => d.total>b.total?d:b, dowData[0]);
  const clientiNoSlot   = clients.filter(c => !c.schedule?.length);

  // Energia
  const energyRows = clientData.filter(d => d.energy.mean !== null)
    .sort((a,b) => a.energy.mean - b.energy.mean);

  // Juri
  const juriAll = STATE.allClients.find(c => c.sonoIo);
  const juriW   = juriAll ? filterByPeriod(STATE.workoutsMap[juriAll.id]||[], 'createdAt', period, dateFrom, dateTo) : [];
  const juriN   = juriAll ? filterByPeriod(STATE.notesMap[juriAll.id]||[], 'date', period, dateFrom, dateTo) : [];

  // Score section
  const scoresSectionHTML = buildClientScoreSection(clientData, periodDays, STATE.skipMap);

  // Update KPI bar
  document.getElementById('periodKpis').innerHTML = `
    <div class="pkpi"><div class="pkpi-val">${clients.length}</div><div class="pkpi-lbl">Clienti</div></div>
    <div class="pkpi"><div class="pkpi-val">${totalSedute}</div><div class="pkpi-lbl">Sedute</div></div>
    <div class="pkpi"><div class="pkpi-val" style="color:${pctDolore>25?'var(--red)':pctDolore>10?'var(--amber)':'var(--green)'}">${pctDolore}%</div><div class="pkpi-lbl">Dolore</div></div>
    <div class="pkpi"><div class="pkpi-val">${avgFreq}×</div><div class="pkpi-lbl">Freq. media</div></div>
  `;

  // Build dashboard HTML
  const painZoneHTML = painZones.slice(0,6).map(([z,n]) => {
    const w = Math.round(n/painZones[0][1]*100);
    return `<div class="db-br"><div class="db-br-l">${esc(z)}</div><div class="db-br-track"><div class="db-br-fill" style="width:${w}%;background:var(--red)"></div></div><div class="db-br-v">${n}×</div></div>`;
  }).join('') || '<div style="color:var(--sub);font-size:.78rem">Nessun dolore nel periodo</div>';

  const energyHTML = energyRows.length ? energyRows.map(({c,energy,notes}) => {
    const col = energy.mean>=7?'var(--green)':energy.mean>=5?'var(--amber)':'var(--red)';
    const arrow = energy.trend==='crescita'?'↑':energy.trend==='calo'?'↓':'→';
    const arrowCol = energy.trend==='crescita'?'var(--green)':energy.trend==='calo'?'var(--red)':'var(--sub)';
    const negTags = notes.flatMap(n=>n.parsed?.hashtags||[]).filter(t=>HASHTAG_NEGATIVE.includes(t));
    const negUniq = [...new Set(negTags)].slice(0,2).map(t=>`<span style="font-family:var(--f-mono);font-size:.5rem;background:var(--red-dim);color:var(--red);padding:2px 6px;border-radius:2px">${t}</span>`).join(' ');
    return `<tr>
      <td style="font-weight:600;font-size:.82rem">${esc(c.nome+' '+c.cognome)}</td>
      <td style="font-family:var(--f-mono);font-weight:700;color:${col}">${energy.mean}/10</td>
      <td style="font-family:var(--f-mono);color:${arrowCol}">${arrow} ${energy.trend}</td>
      <td>${negUniq||'—'}</td>
    </tr>`;
  }).join('') : `<tr><td colspan="4" style="color:var(--sub);font-size:.78rem;padding:12px">Nessuna nota energia nel periodo</td></tr>`;

  const juriHTML = juriAll && juriW.length > 0 ? buildJuriSectionHTML(juriAll, juriW, juriN) : '';

  document.getElementById('dashboardBody').innerHTML = `

    <!-- §01 STUDIO -->
    <div class="db-section">
      <div class="db-section-head">
        <span class="db-sec-num">01 ·</span>
        <span class="db-sec-title">Studio</span>
      </div>
      <div class="db-grid db-grid-3" style="margin-bottom:1px">
        <div class="db-cell db-cell-white">
          <div class="db-ctag">Slot settimanali fissi</div>
          <div class="db-bignum">${slotOccupati}</div>
          <div class="db-unit">slot occupati · settimana</div>
          ${clientiNoSlot.length ? `<div class="db-body" style="color:var(--amber);margin-top:10px">⚠ Senza slot: ${clientiNoSlot.map(c=>c.nome).join(', ')}</div>` : '<div class="db-body" style="color:var(--green)">✓ Tutti i clienti hanno uno slot</div>'}
        </div>
        <div class="db-cell" style="background:var(--ink)">
          <div class="db-ctag" style="color:rgba(255,255,255,.4)">Frequenza media studio</div>
          <div class="db-bignum db-bignum-white">${avgFreq}</div>
          <div class="db-unit db-unit-white">sedute / settimana per cliente</div>
          <div class="db-body db-body-white" style="margin-top:10px">Giorno più intenso: <b>${maxDow.day}</b> (${maxDow.total} sed.)</div>
        </div>
        <div class="db-cell" style="background:${pctDolore>25?'var(--red-dim)':pctDolore>10?'var(--amber-dim)':'var(--green-dim)'}">
          <div class="db-ctag">Sedute con dolore</div>
          <div class="db-bignum" style="color:${pctDolore>25?'var(--red)':pctDolore>10?'var(--amber)':'var(--green)'}">${pctDolore}<span style="font-size:1.8rem">%</span></div>
          <div class="db-unit">${seduteConDolore} su ${totalSedute} sedute</div>
        </div>
      </div>
      <div class="db-grid db-grid-60-40">
        <div class="db-cell db-cell-white">
          <div class="db-ctag">Zone dolore più frequenti · ${periodLabel}</div>
          <div style="margin-top:8px">${painZoneHTML}</div>
        </div>
        <div class="db-cell">
          <div class="db-ctag">Energie studio · media per cliente</div>
          <table style="width:100%;border-collapse:collapse;margin-top:8px">
            <thead><tr style="font-family:var(--f-mono);font-size:.54rem;letter-spacing:.08em;text-transform:uppercase;color:var(--sub)">
              <th style="text-align:left;padding-bottom:8px;border-bottom:1px solid var(--line2)">Cliente</th>
              <th style="padding-bottom:8px;border-bottom:1px solid var(--line2)">Media</th>
              <th style="padding-bottom:8px;border-bottom:1px solid var(--line2)">Trend</th>
              <th style="padding-bottom:8px;border-bottom:1px solid var(--line2)">Alert</th>
            </tr></thead>
            <tbody style="font-size:.8rem">${energyHTML}</tbody>
          </table>
        </div>
      </div>
    </div>

    ${juriHTML ? `<!-- §02 JURI -->
    <div class="db-section">${juriHTML}</div>` : ''}

    <!-- §03 PRIORITÀ CLIENTI -->
    <div class="db-section">
      <div class="db-section-head">
        <span class="db-sec-num">${juriAll&&juriW.length?'03':'02'} ·</span>
        <span class="db-sec-title">Priorità clienti</span>
      </div>
      ${scoresSectionHTML}
    </div>
  `;

  // Animate bars after render
  requestAnimationFrame(() => {
    document.querySelectorAll('.db-br-fill').forEach(el => {
      const w = el.style.width;
      el.style.width = '0';
      requestAnimationFrame(() => { el.style.width = w; });
    });
  });
}

// ─── MODAL MBTI ───────────────────────────────────────────────────────
let _modalClient = null;
let _modalType   = 'cliente'; // 'cliente' | 'wrapped'
let _modalMbti   = '';
let _modalYear   = new Date().getFullYear();

function openReportModal(clientId, type, year) {
  _modalClient = STATE.clients.find(c => c.id === clientId) || STATE.allClients.find(c => c.id === clientId);
  _modalType   = type;
  _modalYear   = year || STATE.wrappedYear;
  _modalMbti   = '';
  const modal = document.getElementById('mbtiModal');
  document.getElementById('modalTitle').textContent =
    type === 'wrapped' ? `🎁 Wrapped ${_modalYear} · ${_modalClient.nome}` : `📄 Report Cliente · ${_modalClient.nome}`;
  document.querySelectorAll('#modalMbtiGrid .mbti-btn').forEach(b => b.classList.toggle('selected', b.dataset.mbti === ''));
  modal.style.display = 'flex';
}

function closeMbtiModal(e) {
  if (e && e.target !== document.getElementById('mbtiModal')) return;
  document.getElementById('mbtiModal').style.display = 'none';
}

function modalSelectMBTI(mbti, btn) {
  _modalMbti = mbti;
  document.querySelectorAll('#modalMbtiGrid .mbti-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function modalGenerate() {
  if (!_modalClient) return;
  const btn = document.getElementById('modalBtnGenerate');
  btn.textContent = '⏳ Generazione...';
  btn.disabled = true;

  const dateFrom = document.getElementById('dateFrom')?.value || '';
  const dateTo   = document.getElementById('dateTo')?.value || '';
  const period   = STATE.period;

  const config = {
    client:      _modalClient,
    reportType:  _modalType,
    period,
    dateFrom,
    dateTo,
    mbti:        _modalMbti,
    workouts:    filterByPeriod(STATE.workoutsMap[_modalClient.id]||[], 'createdAt', period, dateFrom, dateTo),
    allWorkouts: STATE.workoutsMap[_modalClient.id] || [],
    notes:       filterByPeriod(STATE.notesMap[_modalClient.id]||[], 'date', period, dateFrom, dateTo),
    percorso:    STATE.percorsoMap[_modalClient.id] || null,
    skips:       STATE.skipMap[_modalClient.id] || [],
    allClients:  STATE.clients,
    allWorkoutsMap: STATE.workoutsMap,
    allNotesMap:    STATE.notesMap,
    allPercorsoMap: STATE.percorsoMap,
    allSkipMap:     STATE.skipMap
  };

  document.getElementById('mbtiModal').style.display = 'none';
  btn.textContent = '⬇ Genera PDF';
  btn.disabled = false;

  setTimeout(() => {
    if (_modalType === 'wrapped') {
      STATE.wrappedYear = _modalYear;
      STATE.mbti = _modalMbti;
      generateWrappedReport(config);
    } else {
      generateClienteReport(config);
    }
  }, 30);
}

// ─── TEXT GENERATORS ─────────────────────────────────────────────────

function getMBTICfg(mbti) {
  return MBTI_CONFIG[mbti] || MBTI_CONFIG[''];
}

function getPeriodLabelShort(period, dateFrom, dateTo) {
  if (period === 'custom' && dateFrom && dateTo) {
    const s = new Date(dateFrom), e = new Date(dateTo);
    return s.toLocaleDateString('it-IT',{day:'2-digit',month:'short'}) + ' – ' + e.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
  }
  const map = { '1m':'Ultimo mese', '3m':'Ultimo trimestre', '6m':'Ultimi 6 mesi', '1y':'Ultimo anno' };
  return map[period] || 'Periodo selezionato';
}

function generateApertura(c, stats, mbti, tone) {
  const nome = c.nome;
  const freq = stats.freq;
  const goal = c.goal || 'il tuo benessere';

  const starters = {
    emotivo: [
      `${nome}, ci sono periodi che lasciano il segno. Questo è uno di quelli.`,
      `${nome}, guardando indietro a queste settimane, una cosa è chiara: hai scelto di esserci.`
    ],
    energico: [
      `${nome}, bello fare il punto insieme. Hai messo dentro lavoro serio.`,
      `${nome}, il numero che conta di più non è sulle pagine di questo report — è che sei tornato ogni volta.`
    ],
    diretto: [
      `${nome}, i dati parlano chiaro: hai lavorato bene in questo periodo.`,
      `${nome}, andiamo dritti al punto — questo trimestre ha prodotto risultati concreti.`
    ],
    analitico: [
      `${nome}, questo report sintetizza i dati delle ultime settimane di lavoro insieme.`,
      `${nome}, i numeri di questo periodo raccontano una storia chiara. Vale la pena leggerla con attenzione.`
    ],
    delicato: [
      `${nome}, ogni volta che vieni in palestra porti con te qualcosa di importante. Questo periodo lo conferma.`,
      `${nome}, il lavoro fatto insieme non si misura solo in sedute — si misura in presenza e in fiducia.`
    ],
    caldo: [
      `${nome}, è bello guardare indietro e vedere quanto hai costruito in questo periodo.`,
      `${nome}, questo report è per te — perché il tuo impegno merita di essere visto chiaramente.`
    ],
    concreto: [
      `${nome}, ecco il resoconto di quello che abbiamo fatto in questo periodo.`,
      `${nome}, risultati concreti da un lavoro concreto. Andiamo a vederli.`
    ],
    bilanciato: [
      `${nome}, questo report raccoglie quello che abbiamo costruito insieme in questo periodo.`,
      `${nome}, ci sono settimane che non sembrano nulla di speciale — poi le guardi da fuori e capisci che stavano costruendo qualcosa.`
    ]
  };

  const toneStarters = starters[tone] || starters.bilanciato;
  const opener = toneStarters[freq.count % toneStarters.length];

  if (tone === 'emotivo') {
    return `${opener} Ogni seduta che hai scelto di non saltare è un mattone messo sul percorso verso ${goal.toLowerCase()}. Non è scontato, non è automatico — è una scelta. E tu quella scelta la fai.`;
  }
  if (tone === 'diretto') {
    return `${opener} ${freq.count} sedute completate, continuità mantenuta, obiettivo chiaro: ${goal.toLowerCase()}. Il lavoro che resta lo affrontiamo con la stessa chiarezza.`;
  }
  if (tone === 'energico') {
    return `${opener} ${freq.count} sedute nel periodo — ogni volta che sei entrato in palestra con la testa giusta, si è visto. L'obiettivo è ${goal.toLowerCase()} e la strada è tracciata.`;
  }
  if (tone === 'analitico') {
    return `${opener} In questo documento trovi una sintesi strutturata dei progressi nel periodo analizzato, con particolare attenzione a ${goal.toLowerCase()}. I dati sono estratti direttamente dalle sedute registrate.`;
  }
  if (tone === 'delicato') {
    return `${opener} In questo periodo abbiamo lavorato insieme con cura. Ogni seduta porta con sé qualcosa — qualche volta fatica, qualche volta una piccola vittoria. Tutte contano.`;
  }
  if (tone === 'caldo') {
    return `${opener} Guardando i numeri di questo periodo, c'è una cosa che mi colpisce: la costanza. Non è la più spettacolare delle qualità, ma è quella che costruisce risultati veri.`;
  }
  if (tone === 'concreto') {
    return `${opener} Di seguito i dati principali del periodo. Lavoro fatto, obiettivi monitorati, prossimi passi definiti.`;
  }
  return `${opener} In questo periodo hai messo dentro ${freq.count} sedute, ciascuna un passo verso ${goal.toLowerCase()}. Vale la pena fermarsi un momento a guardare quello che si è costruito.`;
}

function generateMomentoMigliore(notes, mbti, tone) {
  // Find best note: ✅ + #progresso
  const sorted = [...notes].sort((a,b) => new Date(a.date)-new Date(b.date));
  let best = null;
  for (const n of sorted) {
    const p = n.parsed;
    if (p.positivi.length && p.hashtags.includes('#progresso')) {
      best = { date: n.date, text: p.positivi[0], hashtags: p.hashtags };
      break;
    }
  }
  // Fallback: first note with ✅
  if (!best) {
    for (const n of sorted) {
      const p = n.parsed;
      if (p.positivi.length) {
        best = { date: n.date, text: p.positivi[0], hashtags: p.hashtags };
        break;
      }
    }
  }
  if (!best) return null;

  const dateLabel = new Date(best.date).toLocaleDateString('it-IT',{day:'2-digit',month:'long'});
  const rawText = best.text.trim();

  const intros = {
    emotivo:   `Il momento che mi è rimasto più impresso`,
    energico:  `Il momento top del periodo`,
    diretto:   `Il risultato tecnico più significativo`,
    analitico: `L'evidenza di progresso più rilevante`,
    delicato:  `Il momento che ha significato di più`,
    caldo:     `Un momento da ricordare`,
    concreto:  `Il progresso più concreto`,
    bilanciato:`Il momento che vale di più`
  };
  const intro = intros[tone] || intros.bilanciato;

  return { dateLabel, rawText, intro };
}

function generateAttenzione(notes, mbti, tone) {
  const sorted = [...notes].sort((a,b) => new Date(b.date)-new Date(a.date));
  // Last note with ⚠️
  for (const n of sorted) {
    if (n.parsed.attenzione.length) {
      return n.parsed.attenzione[0].trim();
    }
  }
  // Fallback: most frequent negative hashtag
  const negs = sorted.flatMap(n => n.parsed.hashtags.filter(t => HASHTAG_NEGATIVE.includes(t)));
  if (negs.length) {
    const freq = {};
    negs.forEach(t => { freq[t] = (freq[t]||0)+1; });
    const top = Object.entries(freq).sort((a,b)=>b[1]-a[1])[0][0];
    const tagMap = {
      '#motivazione-bassa': 'la motivazione in alcune sedute è stata più bassa del solito',
      '#stress':            'lo stress extra-palestra ha influito su alcune sedute',
      '#pocosonno':         'il recupero e il sonno sono stati un fattore da gestire',
      '#regressione':       'alcune sedute hanno mostrato un calo tecnico temporaneo',
      '#preciclo':          'il ciclo ha influito sul rendimento in alcune sedute',
      '#ciclo':             'il ciclo ha influito sul rendimento in alcune sedute',
      '#stresslavoro':      'lo stress lavorativo ha pesato su alcune sedute'
    };
    return tagMap[top] || 'ci sono stati alcuni momenti di calo da tenere monitorati';
  }
  return null;
}

function generateBeforeAfter(c, workouts, notes, freq, energy) {
  const rows = [];
  // Continuità
  if (freq.consecutive >= 2) {
    rows.push({ label:'Continuità', prima:'Variabile / incostante', dopo:`${freq.consecutive} settimane consecutive` });
  } else if (freq.count > 0) {
    rows.push({ label:'Presenze', prima:'–', dopo:`${freq.count} sedute nel periodo` });
  }
  // Energia
  if (energy.mean !== null) {
    const trendLabel = energy.trend==='crescita'?'in crescita ↑':energy.trend==='calo'?'in calo ↓':'stabile →';
    rows.push({ label:'Energia media', prima:'–', dopo:`${energy.mean}/10 · ${trendLabel}` });
  }
  // Dolore risolto
  const sortedW = [...workouts].sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
  let resolved = 0;
  for (let i=0; i<sortedW.length-1; i++) {
    if (sortedW[i].tipoSeduta==='dolori' && sortedW[i+1]?.tipoSeduta==='normale') resolved++;
  }
  if (resolved > 0) {
    rows.push({ label:'Gestione dolore', prima:'Episodi non gestiti', dopo:`${resolved} episodi migliorati ✓` });
  }
  // PainPoints resolved
  const resolvedPP = (c.painPoints||[]).filter(p => p.stato === 'risolto' || p.stato === 'miglioramento');
  if (resolvedPP.length) {
    rows.push({ label:'Zone dolore', prima:resolvedPP.map(p=>p.label).join(', '), dopo:'In miglioramento ✓' });
  }
  return rows;
}

function generateObiettiviProssimoTrimestre(c, stats, tone) {
  const goal = c.goal || 'Benessere generale';
  const freq = stats.freq;
  const energy = stats.energy;

  const base = [];

  // Frequency goal
  if (freq.perWeek < 1) {
    base.push('Portare la frequenza a 1 seduta/settimana in modo stabile');
  } else if (freq.perWeek >= 1 && freq.perWeek < 1.5) {
    base.push('Mantenere la frequenza attuale e consolidare la continuità');
  } else {
    base.push('Continuare con la frequenza attuale — la base è solida');
  }

  // Energy goal
  if (energy.mean !== null && energy.mean < 6) {
    base.push('Migliorare il recupero e l\'energia nelle sedute (target: 7/10)');
  } else if (energy.mean !== null && energy.mean >= 7) {
    base.push('Mantenere i livelli di energia — sono su buoni livelli');
  }

  // Goal-specific
  if (goal.includes('dolore')) {
    base.push('Lavorare sulla gestione del dolore residuo e sulla mobilità');
  } else if (goal.includes('Performance')) {
    base.push('Progredire sul carico e sulla qualità tecnica degli esercizi chiave');
  } else {
    base.push('Continuare a costruire la base di movimento e benessere');
  }

  // MBTI-tinted framing
  if (tone === 'emotivo') return base.map(b => `→ ${b}`);
  if (tone === 'diretto') return base.map(b => `▸ ${b}`);
  if (tone === 'energico') return base.map(b => `⚡ ${b}`);
  return base.map(b => `· ${b}`);
}

// ─── jsPDF HELPERS ────────────────────────────────────────────────────

function pdfWrapText(doc, text, x, maxWidth, lineHeight) {
  const lines = doc.splitTextToSize(text, maxWidth);
  const totalH = lines.length * lineHeight;
  return { lines, totalH };
}

function pdfCheckPage(doc, y, needed, pageH, margin, drawHeaderFn) {
  if (y + needed > pageH - margin) {
    doc.addPage();
    drawHeaderFn(doc);
    return margin + 24;
  }
  return y;
}

function generateClienteReport(config) {
  const btn = document.getElementById('btnGenerate');
  btn.textContent = '⏳ Generazione PDF...';
  btn.disabled = true;

  setTimeout(() => {
    try { _buildClientePDF(config); }
    catch(err) { console.error(err); alert('Errore nella generazione PDF: ' + err.message); }
    finally { btn.textContent = '⬇ Genera PDF'; btn.disabled = false; }
  }, 50);
}

function _buildClientePDF(config) {
  const { jsPDF } = window.jspdf;
  if (!jsPDF) throw new Error('jsPDF non caricato. Verifica la connessione internet.');

  const c       = config.client;
  const mbti    = config.mbti || '';
  const period  = config.period;
  const dateFrom= config.dateFrom;
  const dateTo  = config.dateTo;
  const notes   = config.notes; // already period-filtered, each has .parsed
  const workouts= config.workouts;
  const percorso= config.percorso;

  const cfg  = getMBTICfg(mbti);
  const tone = cfg.tone;
  const accent = cfg.accent; // [r,g,b]

  // ─ Stats ─
  const periodDays = (() => {
    if (period === 'custom') {
      const s = dateFrom ? new Date(dateFrom) : new Date(0);
      const e = dateTo   ? new Date(dateTo)   : new Date();
      return Math.max(1, Math.ceil((e-s)/86400000));
    }
    return { '1m':30,'3m':90,'6m':180,'1y':365 }[period]||90;
  })();

  const freq   = computeFreq(workouts, periodDays);
  const energy = computeEnergy(notes);
  const nome   = c.nome;
  const cognome= c.cognome;
  const periodLabel = getPeriodLabelShort(period, dateFrom, dateTo);
  const today  = new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'});

  // ─ Texts ─
  const testoApertura   = generateApertura(c, { freq, energy }, mbti, tone);
  const momentoObj      = generateMomentoMigliore(notes, mbti, tone);
  const testoAttenzione = generateAttenzione(notes, mbti, tone);
  const beforeAfterRows = generateBeforeAfter(c, workouts, notes, freq, energy);
  const obiettiviList   = generateObiettiviProssimoTrimestre(c, { freq, energy }, tone);

  // ─ jsPDF Setup ─
  const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const PW = 210, PH = 297;
  const ML = 14, MR = 10, MT = 28, MB = 18;
  const CW = PW - ML - MR; // content width = 186mm

  // ─ Colors ─
  const INK    = [17,17,17];
  const MID    = [85,85,85];
  const SUB    = [153,153,153];
  const LINE   = [229,224,213];
  const WHITE  = [255,255,255];
  const BG     = [250,249,246];
  const GREEN  = [46,125,50];
  const AMBER  = [230,81,0];
  const RED    = [229,57,53];

  let pageNum = 1;

  // ─ Draw page header (called on each new page) ─
  function drawPageHeader(d) {
    // Dark top bar
    d.setFillColor(...INK);
    d.rect(0, 0, PW, 18, 'F');
    // Accent stripe left
    d.setFillColor(...accent);
    d.rect(0, 0, 3.5, 18, 'F');
    // Name
    d.setFont('helvetica','bold');
    d.setFontSize(7.5);
    d.setTextColor(...WHITE);
    d.text(`${nome.toUpperCase()} ${cognome.toUpperCase()}`, ML + 2, 11);
    // Period + PT name right
    d.setFont('helvetica','normal');
    d.setFontSize(6.5);
    d.setTextColor(180,180,180);
    d.text(`${periodLabel}  ·  Juri Monasso PT`, PW - MR, 11, { align:'right' });
    if (mbti) {
      d.setFontSize(6);
      d.setTextColor(...accent);
      const mbtiLabel = mbti + (cfg.label ? ' · ' + cfg.label : '');
      d.text(mbtiLabel, ML + 2, 16);
    }
  }

  // ─ Draw page footer ─
  function drawPageFooter(d, pn) {
    d.setDrawColor(...LINE);
    d.setLineWidth(0.3);
    d.line(ML, PH - MB + 2, PW - MR, PH - MB + 2);
    d.setFont('helvetica','normal');
    d.setFontSize(6.5);
    d.setTextColor(...SUB);
    d.text('Juri Monasso · Allenati Senza Dolori', ML, PH - MB + 8);
    d.text(`${pn}`, PW - MR, PH - MB + 8, { align:'right' });
  }

  // ─ Helper: section label ─
  function drawSectionLabel(d, y, num, title) {
    d.setFont('helvetica','bold');
    d.setFontSize(6);
    d.setTextColor(...accent);
    d.text(`0${num} ·`, ML, y);
    d.setFont('helvetica','bold');
    d.setFontSize(10);
    d.setTextColor(...INK);
    d.text(title, ML + 8, y);
    d.setDrawColor(...LINE);
    d.setLineWidth(0.25);
    d.line(ML, y + 2.5, ML + CW, y + 2.5);
    return y + 9;
  }

  // ─ Helper: accent stripe box ─
  function drawBox(d, x, y, w, h, stripeColor, bgColor) {
    d.setFillColor(...bgColor);
    d.rect(x, y, w, h, 'F');
    d.setFillColor(...stripeColor);
    d.rect(x, y, 3, h, 'F');
  }

  // ─ Helper: kpi chip ─
  function drawKPI(d, x, y, w, label, value, sub, color) {
    d.setFillColor(245, 240, 232); // warm
    d.rect(x, y, w, 18, 'F');
    d.setFont('helvetica','bold');
    d.setFontSize(17);
    d.setTextColor(...color);
    d.text(value, x + w/2, y + 11, { align:'center' });
    d.setFont('helvetica','bold');
    d.setFontSize(5.5);
    d.setTextColor(...SUB);
    d.text(label.toUpperCase(), x + w/2, y + 15.5, { align:'center' });
    if (sub) {
      d.setFont('helvetica','normal');
      d.setFontSize(5);
      d.setTextColor(...SUB);
      d.text(sub, x + w/2, y + 18.5, { align:'center' });
    }
  }

  // ═══════════════════════════════════
  // PAGE 1
  // ═══════════════════════════════════
  drawPageHeader(doc);

  let y = MT + 4;

  // ── COVER AREA ── nome grande
  doc.setFont('helvetica','bold');
  doc.setFontSize(28);
  doc.setTextColor(...INK);
  doc.text(nome, ML, y + 10);

  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(...MID);
  doc.text(`Report personale · ${periodLabel}`, ML, y + 17);

  // Accent line under name
  doc.setFillColor(...accent);
  doc.rect(ML, y + 19, 30, 1, 'F');

  y += 26;

  // ── KPI ROW ──
  const kpiW = (CW - 6) / 4; // 4 chips with 2mm gap each
  const kpiY = y;

  const energyColor = energy.mean===null ? SUB : energy.mean>=7 ? GREEN : energy.mean>=5 ? AMBER : RED;
  const freqColor   = freq.perWeek>=1 ? GREEN : freq.perWeek>=0.5 ? AMBER : RED;

  drawKPI(doc, ML,             kpiY, kpiW, 'Sedute',        String(freq.count),         'nel periodo',       INK);
  drawKPI(doc, ML+kpiW+2,      kpiY, kpiW, 'Energia media', energy.mean ? energy.mean+'/10' : '—', notes.length ? notes.length+' rilevaz.' : '', energyColor);
  drawKPI(doc, ML+kpiW*2+4,    kpiY, kpiW, 'Continuità',    freq.consecutive+' sett.',  freq.consecutive>=4?'ottima!':'', freq.consecutive>=4?GREEN:INK);
  drawKPI(doc, ML+kpiW*3+6,    kpiY, kpiW, 'Freq. media',   freq.perWeek>0?freq.perWeek+'×/sett':'—', '', freqColor);

  y += 22;

  // ── §1 APERTURA ──
  y = drawSectionLabel(doc, y, 1, 'Una parola per te');

  const aperturaWrapped = doc.splitTextToSize(testoApertura, CW);
  doc.setFont('helvetica','normal');
  doc.setFontSize(9.5);
  doc.setTextColor(...MID);

  // box with accent stripe
  const aperturaH = aperturaWrapped.length * 5.2 + 10;
  drawBox(doc, ML, y, CW, aperturaH, accent, [250,249,246]);
  doc.text(aperturaWrapped, ML + 6, y + 7);
  y += aperturaH + 6;

  // ── §2 MOMENTO MIGLIORE ──
  if (momentoObj) {
    y = drawSectionLabel(doc, y, 2, momentoObj.intro);

    const dateChipW = 28;
    doc.setFillColor(...accent);
    doc.rect(ML, y, dateChipW, 6, 'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(6.5);
    doc.setTextColor(...WHITE);
    doc.text(momentoObj.dateLabel.toUpperCase(), ML + dateChipW/2, y + 4.2, { align:'center' });

    y += 8;
    const momLines = doc.splitTextToSize(`"${momentoObj.rawText}"`, CW - 4);
    const momH = momLines.length * 5.5 + 8;
    doc.setFillColor(245, 240, 232);
    doc.rect(ML, y, CW, momH, 'F');
    doc.setFont('helvetica','italic');
    doc.setFontSize(9);
    doc.setTextColor(...INK);
    doc.text(momLines, ML + 4, y + 7);
    y += momH + 6;
  }

  // ── §3 COME SEI CAMBIATO ──
  if (beforeAfterRows.length) {
    y = drawSectionLabel(doc, y, 3, 'Come sei cambiato');

    // Table header
    const col1 = ML, col2 = ML + CW * 0.32, col3 = ML + CW * 0.65;
    const colW1 = CW * 0.30, colW2 = CW * 0.32, colW3 = CW * 0.35;

    doc.setFillColor(...INK);
    doc.rect(ML, y, CW, 6.5, 'F');
    doc.setFont('helvetica','bold');
    doc.setFontSize(6);
    doc.setTextColor(...WHITE);
    doc.text('ASPETTO', col1 + 2, y + 4.5);
    doc.text('PRIMA', col2 + 2, y + 4.5);
    doc.text('ORA', col3 + 2, y + 4.5);
    y += 6.5;

    beforeAfterRows.forEach((row, i) => {
      const rowH = 7;
      doc.setFillColor(i % 2 === 0 ? 250 : 245, i % 2 === 0 ? 249 : 244, i % 2 === 0 ? 246 : 241);
      doc.rect(ML, y, CW, rowH, 'F');
      doc.setFont('helvetica','bold');
      doc.setFontSize(7.5);
      doc.setTextColor(...INK);
      doc.text(row.label, col1 + 2, y + 5);
      doc.setFont('helvetica','normal');
      doc.setTextColor(...MID);

// ─── ANALYTICS ───────────────────────────────────────────────────────

function getPeriodDays(period, dateFrom, dateTo) {
  if (period === 'custom') {
    const s = dateFrom ? new Date(dateFrom) : new Date(0);
    const e = dateTo   ? new Date(dateTo)   : new Date();
    return Math.max(1, Math.ceil((e - s) / 86400000));
  }
  return { '1m': 30, '3m': 90, '6m': 180, '1y': 365 }[period] || 90;
}

function getPeriodLabel(period, dateFrom, dateTo) {
  if (period === 'custom' && dateFrom && dateTo) {
    const s = new Date(dateFrom), e = new Date(dateTo);
    return s.toLocaleDateString('it-IT',{day:'2-digit',month:'short'}) + ' → ' + e.toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'});
  }
  return { '1m': 'Ultimo mese', '3m': 'Ultimo trimestre', '6m': 'Ultimi 6 mesi', '1y': 'Ultimo anno' }[period] || period;
}

function getPeriodMonthLabel(period, dateFrom, dateTo) {
  const now = new Date();
  if (period === 'custom' && dateFrom) {
    const d = new Date(dateFrom);
    return d.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  }
  // For 1m, show current month name
  return now.toLocaleDateString('it-IT',{month:'long',year:'numeric'});
}

function computeFreq(workouts, periodDays) {
  if (!workouts.length) return { count: 0, perWeek: 0, consecutive: 0, lastDate: null };
  const sorted = [...workouts].sort((a,b) => new Date(a.createdAt)-new Date(b.createdAt));
  const weeks = Math.max(periodDays/7, 1);
  const perWeek = Math.round(workouts.length / weeks * 10) / 10;
  const lastDate = sorted[sorted.length-1].createdAt;
  // consecutive weeks present
  const weekSet = new Set();
  sorted.forEach(w => {
    const d = new Date(w.createdAt);
    const jan1 = new Date(d.getFullYear(),0,1);
    const wn = Math.ceil(((d-jan1)/86400000 + jan1.getDay()+1)/7);
    weekSet.add(d.getFullYear()+'-'+wn);
  });
  return { count: workouts.length, perWeek, consecutive: weekSet.size, lastDate };
}

function computeEnergy(notes) {
  const vals = notes.map(n => n.parsed?.energia).filter(e => e != null);
  if (!vals.length) return { mean: null, trend: null, vals: [] };
  const mean = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10;
  let trend = 'stabile';
  if (vals.length >= 4) {
    const h = Math.floor(vals.length/2);
    const f = vals.slice(0,h).reduce((a,b)=>a+b,0)/h;
    const s = vals.slice(h).reduce((a,b)=>a+b,0)/(vals.length-h);
    if (s-f > 0.8) trend = 'crescita';
    else if (f-s > 0.8) trend = 'calo';
  }
  return { mean, trend, vals };
}

function computePainZones(workouts) {
  const z = {};
  workouts.forEach(w => {
    if (w.tipoSeduta==='dolori' && Array.isArray(w.painStart)) {
      w.painStart.forEach(p => { if(p.label) z[p.label]=(z[p.label]||0)+1; });
    }
  });
  return Object.entries(z).sort((a,b)=>b[1]-a[1]);
}

function computeDowCounts(workouts) {
  const days = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  const total = [0,0,0,0,0,0,0];
  const pain  = [0,0,0,0,0,0,0];
  workouts.forEach(w => {
    const d = new Date(w.createdAt);
    const idx = (d.getDay()+6)%7; // 0=Mon
    total[idx]++;
    if (w.tipoSeduta==='dolori') pain[idx]++;
  });
  return days.map((d,i) => ({ day:d, total:total[i], pain:pain[i] }));
}

function computeCalHeatmap(workouts, period, dateFrom, dateTo) {
  const now = new Date();
  let start, end;
  if (period === 'custom') {
    start = dateFrom ? new Date(dateFrom) : new Date(now-30*86400000);
    end   = dateTo   ? new Date(dateTo)   : now;
  } else {
    const days = { '1m':30,'3m':90,'6m':180,'1y':365 }[period]||30;
    start = new Date(now - days*86400000);
    end = now;
  }
  const map = {};
  const painDays = new Set();
  workouts.forEach(w => {
    const d = w.createdAt.slice(0,10);
    map[d] = (map[d]||0)+1;
    if (w.tipoSeduta==='dolori') painDays.add(d);
  });
  return { map, painDays, start, end };
}

function computeAlerts(clients, workoutsMap, notesMap, percorsoMap, period, dateFrom, dateTo) {
  const periodDays = getPeriodDays(period, dateFrom, dateTo);
  const now = new Date();
  const twoWeeksAgo = new Date(now - 14*86400000);
  const alerts = [];

  clients.forEach(c => {
    const allW = workoutsMap[c.id] || [];
    const w = filterByPeriod(allW, 'createdAt', period, dateFrom, dateTo);
    const notes = filterByPeriod(notesMap[c.id]||[], 'date', period, dateFrom, dateTo);
    const name = c.nome+' '+c.cognome;
    const freq = computeFreq(w, periodDays);
    const energy = computeEnergy(notes);
    const percorso = percorsoMap[c.id]||null;

    const recentW = allW.filter(w2 => new Date(w2.createdAt) >= twoWeeksAgo);
    if (allW.length>0 && recentW.length===0)
      alerts.push({ priority:'HIGH', client:name, msg:'Nessuna seduta nelle ultime 2 settimane' });
    if (w.length>0 && freq.perWeek<0.5)
      alerts.push({ priority:'HIGH', client:name, msg:`Frequenza critica: ${freq.perWeek}×/sett` });
    if (notes.length>=2) {
      const last2 = [...notes].sort((a,b)=>new Date(b.date)-new Date(a.date))
        .slice(0,2).map(n=>n.parsed?.energia).filter(e=>e!=null);
      if (last2.length===2 && last2[0]<=4 && last2[1]<=4)
        alerts.push({ priority:'HIGH', client:name, msg:`Energia bassa: ${last2[1]}/10 → ${last2[0]}/10` });
    }
    const sortedW = [...w].sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
    if (sortedW.length>0 && sortedW[sortedW.length-1].tipoSeduta==='dolori')
      alerts.push({ priority:'HIGH', client:name, msg:'Ultima seduta in dolore — nessuna normale successiva' });

    if (w.length>0 && freq.perWeek>=0.5 && freq.perWeek<1.0)
      alerts.push({ priority:'MEDIUM', client:name, msg:`Frequenza bassa: ${freq.perWeek}×/sett` });
    if (percorso && percorso.total>0 && percorso.pct<30)
      alerts.push({ priority:'MEDIUM', client:name, msg:`Percorso Fit al ${percorso.pct}%` });
    const negCount = notes.flatMap(n=>n.parsed?.hashtags||[]).filter(t=>HASHTAG_NEGATIVE.includes(t)).length;
    if (negCount>=3)
      alerts.push({ priority:'MEDIUM', client:name, msg:`${negCount} hashtag negativi nel periodo` });

    if (!c.schedule || c.schedule.length===0)
      alerts.push({ priority:'LOW', client:name, msg:'Nessuno slot settimanale fisso' });
    if (c.prt!=='confermato' && c.profilo==='dolore_adulto')
      alerts.push({ priority:'LOW', client:name, msg:'Dolore adulto — PRT non confermato' });
  });

  return alerts.sort((a,b) => ({'HIGH':0,'MEDIUM':1,'LOW':2}[a.priority]-{'HIGH':0,'MEDIUM':1,'LOW':2}[b.priority]));
}

// ─── HTML BUILDER HELPERS ─────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildCalendarHTML(calData, weeks) {
  const { map, painDays, start, end } = calData;
  // Build array of all dates in period (max 16 weeks = 112 days for readability)
  const dates = [];
  const cur = new Date(start);
  while (cur <= end && dates.length < 112) {
    dates.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
  }
  const dayLabels = ['L','M','M','G','V','S','D'];
  let html = `<div class="cal-grid">`;
  dayLabels.forEach(d => { html += `<div class="cal-h">${d}</div>`; });
  // padding for first day
  const firstDay = (new Date(dates[0]).getDay()+6)%7;
  for (let i=0;i<firstDay;i++) html += `<div class="cal-cell empty"></div>`;
  dates.forEach(ds => {
    const n = map[ds]||0;
    const isPain = painDays.has(ds);
    const cls = n===0?'n0':n<=1?'n1':n<=2?'n2':n<=3?'n3':n<=4?'n4':n<=5?'n5':'n6';
    const label = n>0 ? n : '';
    const dayNum = ds.slice(8);
    html += `<div class="cal-cell ${cls}${isPain?' pain-day':''}" title="${ds}: ${n} sed.${isPain?' · dolore':''}">${label}</div>`;
  });
  html += `</div>`;
  return html;
}

function buildDowBarsHTML(dowData) {
  const maxT = Math.max(...dowData.map(d=>d.total),1);
  let html = `<div class="dow-chart">`;
  dowData.forEach(d => {
    const hPct = Math.round(d.total/maxT*100);
    const painPct = d.total>0 ? Math.round(d.pain/d.total*100) : 0;
    const color = d.day==='Ven' ? '#e53935' : '#111';
    html += `<div class="dow-bar-wrap">
      <div class="dow-n">${d.total}</div>
      <div class="dow-outer"><div class="dow-inner" style="--h:${hPct}%;background:${color}"></div></div>
      <div class="dow-l">${d.day}</div>
      ${d.pain>0?`<div class="dow-pain">${painPct}%🔴</div>`:''}
    </div>`;
  });
  html += `</div>`;
  return html;
}

function buildPainZoneBarsHTML(zones) {

function buildFreqBarsHTML(clientData) {

function buildFreqTableHTML(clientData, periodDays) {

function buildEnergyTableHTML(clientData) {
  const sorted = [...clientData].filter(d=>d.energy.mean!==null).sort((a,b)=>a.energy.mean-b.energy.mean);
  if (!sorted.length) return `<div class="empty-note">Nessuna nota energia nel periodo</div>`;
  return sorted.map(({c,energy,notes}) => {
    const col = energy.mean>=7?'#2e7d32':energy.mean>=5?'#e65100':'#e53935';
    const arrow = energy.trend==='crescita'?'↑ crescita':energy.trend==='calo'?'↓ calo':'→ stabile';
    const arrowCol = energy.trend==='crescita'?'#2e7d32':energy.trend==='calo'?'#e53935':'#555';
    const negTags = notes.flatMap(n=>n.parsed?.hashtags||[]).filter(t=>HASHTAG_NEGATIVE.includes(t));
    const negUniq = [...new Set(negTags)].slice(0,3).map(t=>`<span class="pill bad">${t}</span>`).join('');
    return `<tr>
      <td style="font-weight:600">${esc(c.nome+' '+c.cognome)}</td>
      <td class="mono big-num" style="color:${col}">${energy.mean}/10</td>
      <td class="mono" style="color:${arrowCol}">${arrow}</td>
      <td>${negUniq||'—'}</td>
    </tr>`;
  }).join('');
}

function buildPainMapHTML(clientData) {
  const rows = [];
  clientData.forEach(({c,w}) => {
    const sorted = [...w].sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));

      </div>`:`<div class="c c-g-tint"><div class="c-tag c-tag-g">✓ Hip dominant presente</div><div class="c-body">Stai includendo lavoro hip dominant nelle tue sedute.</div></div>`}
